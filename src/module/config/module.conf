# NetProxy 模块设置
# 开机自动启动服务 (1=启用, 0=禁用)
AUTO_START=0
# 出站模式 (rule=规则分流, global=全局代理, direct=全局直连)
OUTBOUND_MODE=rule
# 节点选择模式 (manual=手动选择, urltest=动态测速)
SELECTOR_MODE=urltest
# GMS 修复 (1=启用, 0=禁用)
GMS_FIX=0
# 当前使用的 sing-box 出站配置文件路径
CURRENT_CONFIG=""

# ##################################################################
# # 以下为扩展功能配置，由 scripts/core/ 下的调度/监听脚本读取。
# ##################################################################

# ===================== 订阅定时更新 (subsched.sh) =====================
# 定时自动更新全部订阅 (1=启用, 0=禁用)
SUB_AUTO_UPDATE=0
# 更新间隔小时数 (正整数, 1~23)
SUB_UPDATE_INTERVAL=12
